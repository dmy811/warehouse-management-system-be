[package]
name = "warehouse-management-system-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
# Web Framework and related
axum = { version = "0.8.8", features = ["macros", "multipart"] }
axum-extra = { version = "0.12.5", features = ["typed-header"] }
tower = { version = "0.5.3", features = ["util"] }
tower-http = { version = "0.6.8", features = ["trace", "cors", "compression-gzip"] }
tokio = { version = "1.50.0", features = ["full"] }

# Database
sqlx = { version = "0.8.6", features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "chrono", "migrate"] }

# Auth / Security
argon2 = "0.5.3"
jsonwebtoken = { version = "10.3.0" }

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

# Validation
validator = { version = "0.20.0", features = ["derive"] }

# Error Handling
thiserror = "2.0.18"
anyhow = "1.0.102"

# Tracing / Logging
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }

# File Upload
reqwest = { version = "0.13.2", features = ["json", "multipart"] }

# Utilities
async-trait = "0.1.89" # agar bisa buat trait async
base64 = "0.22.1" # Encode/decode Base64 — format yang mengubah binary data menjadi teks ASCII yang aman untuk dikirim lewat HTTP.
chrono = { version = "0.4.44", features = ["serde"] }
dotenvy = "0.15.7"
hex = "0.4.3" # Mengubah raw bytes menjadi hex string (dan sebaliknya). SHA-256 menghasilkan [u8; 32] — 32 bytes mentah. Tapi Cloudinary butuh string seperti "a3f9b2c1..."
once_cell = "1.21.4" # Untuk membuat nilai yang diinisialisasi sekali saja saat pertama kali diakses, lalu di-reuse selamanya. Conton utk regex
sha2 = "0.10.9" # Cloudinary mewajibkan setiap upload request ditandatangani dengan SHA-256 dari parameter + API secret.
uuid = { version = "1.22.0", features = ["v4", "serde"] }
